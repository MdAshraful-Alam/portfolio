<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Placeholder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f5;
        color: #0a0a0a;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      main {
        max-width: 640px;
        padding: 32px;
        border: 1px solid #d4d4d4;
        background: #ffffff;
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      p {
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resume Link Placeholder</h1>
      <p>
        Replace the current resume link in <code>src/data/portfolio.ts</code> with your real PDF or hosted resume URL before publishing the site.
      </p>
      <p>
        The portfolio is already wired so the Resume button can point to any public PDF, Google Drive share link, or file placed in <code>public/</code>.
      </p>
    </main>
  </body>
  </html>
